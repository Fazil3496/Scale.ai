<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale.ai | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.5s ease; }
        .bg-dark { background-color: #050505; }
        .bg-off { background-color: #020202; }

        /* The Neon Glow Effect */
        .glow-box {
            transition: all 0.5s ease;
            box-shadow: 0 0 20px rgba(20, 255, 236, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light-on .glow-box {
            box-shadow: 0 0 50px rgba(20, 255, 236, 0.6);
            border: 1px solid rgba(20, 255, 236, 0.4);
        }

        /* Cute Lamp CSS */
        .lamp-container { cursor: pointer; position: relative; transition: transform 0.3s ease; }
        .lamp-container:active { transform: scale(0.95); }
        .lamp-head {
            width: 120px; height: 100px;
            background: #2dd4bf; border-radius: 50% 50% 15% 15%;
            position: relative; transition: 0.5s;
            box-shadow: inset 0 10px 20px rgba(255,255,255,0.3);
        }
        .light-off .lamp-head { background: #134e4a; box-shadow: none; }

        /* Face Details */
        .eyes { display: flex; justify-content: space-around; padding-top: 40px; width: 60%; margin: 0 auto; }
        .eye { width: 12px; height: 12px; background: #000; border-radius: 50%; transition: 0.3s; }
        .light-off .eye { height: 2px; margin-top: 5px; } /* Closed eyes when off */
        .mouth {
            width: 20px; height: 10px; border-bottom: 3px solid #000;
            margin: 5px auto; border-radius: 50%;
        }

        .lamp-stick { width: 8px; height: 80px; background: #334155; margin: -5px auto 0; }
        .lamp-base { width: 60px; height: 15px; background: #334155; border-radius: 10px; margin: -5px auto 0; }
    </style>
</head>
<body class="bg-dark light-on flex items-center justify-center min-h-screen p-4" id="main-body">

    <div class="w-full max-w-5xl flex flex-col md:flex-row items-center justify-center gap-12">

        <div class="flex flex-col items-center" onclick="toggleLight()">
            <div class="lamp-container">
                <div class="lamp-head" id="lamp-head">
                    <div class="eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                    <div class="mouth"></div>
                </div>
                <div class="lamp-stick"></div>
                <div class="lamp-base"></div>
            </div>
            <p class="text-teal-400 mt-4 font-bold text-sm tracking-widest animate-pulse" id="status-text">CLICK TO TURN OFF</p>
        </div>

        <div class="glow-box w-full max-w-md rounded-3xl p-8 md:p-12 bg-[#0A0A0A] relative z-10">
            <h2 class="text-3xl font-bold text-white mb-2">Welcome Back</h2>
            <p class="text-gray-400 mb-8 text-sm">Scale.ai is ready for your next project.</p>

            <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
                <div>
                    <label class="block text-xs font-medium text-teal-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" name="username" required class="w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-teal-500 transition-all" placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-xs font-medium text-teal-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" name="password" required class="w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-teal-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-teal-600 hover:bg-teal-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-teal-500/20">
                    SIGN IN
                </button>
            </form>

            <p class="mt-8 text-center text-gray-500 text-sm">
               Don't have an account? <a href="{{ url_for('signup') }}" class="text-teal-400 hover:text-teal-300 font-semibold">Join Scale.ai</a>
            </p>
        </div>
    </div>

    <script>
        function toggleLight() {
            const body = document.getElementById('main-body');
            const status = document.getElementById('status-text');

            if (body.classList.contains('light-on')) {
                body.classList.remove('light-on');
                body.classList.add('light-off');
                body.classList.replace('bg-dark', 'bg-off');
                status.innerText = "CLICK TO TURN ON";
                status.classList.replace('text-teal-400', 'text-gray-700');
            } else {
                body.classList.remove('light-off');
                body.classList.add('light-on');
                body.classList.replace('bg-off', 'bg-dark');
                status.innerText = "CLICK TO TURN OFF";
                status.classList.replace('text-gray-700', 'text-teal-400');
            }
        }
    </script>
</body>
</html>
