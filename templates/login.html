<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale.ai | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; }
        /* This creates that "Frosted Glass" look for the login box */
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass w-full max-w-4xl rounded-3xl overflow-hidden flex flex-col md:flex-row shadow-2xl">

        <div class="md:w-1/2 bg-indigo-600 p-12 flex flex-col justify-center relative overflow-hidden">
            <div class="relative z-10">
                <h1 class="text-4xl font-bold text-white mb-4">Scale.ai</h1>
                <p class="text-indigo-100 text-lg">The AI sidekick for your next big school project. 🚀</p>
            </div>

            <div class="absolute -bottom-20 -left-20 w-64 h-64 bg-indigo-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
            <div class="absolute -top-20 -right-20 w-64 h-64 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse delay-700"></div>
        </div>

        <div class="md:w-1/2 p-8 md:p-12 bg-[#0A0A0A]">
            <h2 class="text-2xl font-semibold text-white mb-2">Welcome back</h2>
            <p class="text-gray-400 mb-8 text-sm">Log in to your student workspace.</p>

            <form action="/login" method="POST" class="space-y-5">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token else '' }}">

                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">Username</label>
                    <input type="text" name="username" required class="w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-indigo-500 transition-all" placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" name="password" required class="w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-indigo-500 transition-all" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                    Sign In
                </button>
            </form>

            <p class="mt-8 text-center text-gray-500 text-sm">
               <p>Don't have an account? <a href="{{ url_for('signup') }}">Join Scale.ai</a></p>
            </p>
        </div>
    </div>

</body>
</html>
