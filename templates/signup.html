<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale.ai | Join</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="glass w-full max-w-md rounded-3xl overflow-hidden p-8 md:p-12 bg-[#0A0A0A] shadow-2xl">
        <h2 class="text-2xl font-semibold text-white mb-2">Create Account</h2>
        <p class="text-gray-400 mb-8 text-sm">Join the Scale.ai student community.</p>

        <<form action="{{ url_for('signup') }}" method="POST">
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">Choose Username</label>
                <input type="text" name="username" required class="w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-indigo-500 transition-all" placeholder="fazil_dev">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">Password</label>
                <input type="password" name="password" required class="w-full bg-[#121212] border border-white/10 rounded-xl px-4 py-3 text-white outline-none focus:border-indigo-500 transition-all" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-indigo-500/20">
                Sign Up
            </button>
        </form>
        <p class="mt-8 text-center text-gray-500 text-sm">
           <p>Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
        </p>
    </div>
</body>
</html>
